{{ define "main" }}
<style>
    /* ===============================
   Base: mobile first
   =============================== */

    .photo-grid {
        column-count: 2;
        column-gap: 10px;
        margin-top: 1.5rem;
    }

    .photo-item {
        break-inside: avoid;
        margin-bottom: 10px;
        position: relative;
        overflow: hidden;
        border-radius: 6px;
        background-color: #e8e8e8;
    }

    .photo-item a {
        display: block;
        height: 100%;
    }

    .photo-placeholder,
    .photo-thumb {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 6px;
    }

    .photo-placeholder {
        filter: blur(12px);
        transform: scale(1.1);
        transition: opacity 0.5s ease;
    }

    .photo-thumb {
        opacity: 0;
        transition: opacity 0.5s ease;
    }

    .photo-item.img-loaded .photo-placeholder {
        opacity: 0;
        pointer-events: none;
    }

    .photo-item.img-loaded .photo-thumb {
        opacity: 1;
    }

    /* ===============================
   Tablet
   =============================== */

    @media (min-width: 640px) {
        .photo-grid {
            column-count: 3;
            column-gap: 12px;
        }

        .photo-item {
            margin-bottom: 12px;
        }
    }

    /* ===============================
   Desktop
   =============================== */

    @media (min-width: 1024px) {
        .photo-grid {
            column-count: 4;
            column-gap: 14px;
        }

        .photo-item {
            margin-bottom: 14px;
        }
    }

    /* ===============================
   Future enhancement: Grid Lanes
   =============================== */

    @supports (display: grid-lanes) {
        .photo-grid {
            display: grid-lanes;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            column-count: initial;
        }

        @media (max-width: 1023px) {
            .photo-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 639px) {
            .photo-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .photo-item {
            margin-bottom: 0;
        }
    }
</style>
<section class="photo-grid">
    {{ $images := resources.Match "photos/*" }}
    {{ range $images }}
    {{ $thumb := .Resize "800x webp" }}
    {{ $tiny := .Resize "20x webp q20" }}
    <figure class="photo-item" style="aspect-ratio: {{ .Width }} / {{ .Height }};">
        <a href="{{ .RelPermalink }}" target="_blank">
            <img
                src="data:{{ $tiny.MediaType.Type }};base64,{{ $tiny.Content | base64Encode }}"
                class="photo-placeholder"
                alt=""
                aria-hidden="true"
            />
            <img
                src="{{ $thumb.RelPermalink }}"
                loading="lazy"
                decoding="async"
                class="photo-thumb"
                alt=""
            />
        </a>
    </figure>
    {{ end }}
</section>

<script>
(function () {
    function markLoaded(img) {
        img.closest('.photo-item').classList.add('img-loaded');
    }
    document.querySelectorAll('.photo-thumb').forEach(function (img) {
        if (img.complete && img.naturalWidth > 0) {
            markLoaded(img);
        } else {
            img.addEventListener('load', function () { markLoaded(img); });
        }
    });
})();
</script>

{{ end }}
